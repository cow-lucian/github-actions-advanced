# =============================================================================
# 02 - Service Containers in Depth
# =============================================================================
# Service containers provide external dependencies (databases, caches,
# message brokers) for your workflow jobs. They are:
#   - Started BEFORE any steps execute
#   - Torn down AFTER the job completes (even on failure)
#   - Accessible by hostname (in container jobs) or localhost (on host)
#   - Health-checked to ensure readiness before steps run
#
# This workflow demonstrates advanced service container patterns including
# health checks, initialization, and integration testing strategies.
# =============================================================================

name: "02 - Service Containers"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Global environment variables used across jobs
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: PostgreSQL service with full configuration
  # ---------------------------------------------------------------------------
  postgres-service:
    name: "PostgreSQL Integration Tests"
    runs-on: ubuntu-latest

    services:
      # The key "postgres" becomes the hostname when running in a container
      # or the service identifier when running on the host
      postgres:
        # Always pin to a specific version for reproducibility
        image: postgres:16.2-alpine

        # Environment variables configure the PostgreSQL instance
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: myapp_test
          # Additional PostgreSQL configuration
          POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

        # Port mapping: host_port:container_port
        # For host-based jobs, you connect to the host_port
        ports:
          - 5432:5432

        # Health check configuration
        # GitHub Actions will wait until the health check passes before
        # running any steps. If it never passes, the job fails.
        options: >-
          --health-cmd="pg_isready -U testuser -d myapp_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s
          --name=test-postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Verify PostgreSQL is ready
        run: |
          # On the host, connect via localhost
          pg_isready -h localhost -p 5432 -U testuser
          echo "PostgreSQL is ready!"

      - name: Initialize database schema
        run: |
          # Run schema setup using psql (pre-installed on ubuntu runners)
          PGPASSWORD=testpassword psql \
            -h localhost \
            -p 5432 \
            -U testuser \
            -d myapp_test \
            -c "
              -- Create extensions
              CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
              CREATE EXTENSION IF NOT EXISTS \"pgcrypto\";

              -- Create tables
              CREATE TABLE users (
                id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                email TEXT UNIQUE NOT NULL,
                name TEXT NOT NULL,
                password_hash TEXT NOT NULL,
                created_at TIMESTAMPTZ DEFAULT NOW(),
                updated_at TIMESTAMPTZ DEFAULT NOW()
              );

              CREATE TABLE posts (
                id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                user_id UUID REFERENCES users(id) ON DELETE CASCADE,
                title TEXT NOT NULL,
                body TEXT,
                published BOOLEAN DEFAULT FALSE,
                created_at TIMESTAMPTZ DEFAULT NOW()
              );

              -- Create indexes
              CREATE INDEX idx_posts_user_id ON posts(user_id);
              CREATE INDEX idx_posts_published ON posts(published) WHERE published = TRUE;

              -- Insert seed data
              INSERT INTO users (email, name, password_hash) VALUES
                ('alice@example.com', 'Alice', crypt('password1', gen_salt('bf'))),
                ('bob@example.com', 'Bob', crypt('password2', gen_salt('bf')));
            "

      - name: Verify schema and seed data
        run: |
          PGPASSWORD=testpassword psql \
            -h localhost -p 5432 -U testuser -d myapp_test \
            -c "SELECT email, name FROM users ORDER BY name;"

      - name: Install dependencies
        run: npm ci

      - name: Run database integration tests
        run: npm test
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/myapp_test
          DATABASE_SSL: "false"

  # ---------------------------------------------------------------------------
  # Job 2: Redis service with advanced patterns
  # ---------------------------------------------------------------------------
  redis-service:
    name: "Redis Integration Tests"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine

        # Redis with custom configuration via command
        # Note: for complex redis.conf, mount a volume instead
        ports:
          - 6379:6379

        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Verify Redis connectivity
        run: |
          redis-cli -h localhost -p 6379 ping
          redis-cli -h localhost -p 6379 info server | head -5

      - name: Pre-populate Redis test data
        run: |
          # Set up test data that integration tests expect
          redis-cli -h localhost -p 6379 <<'EOF'
          SET session:user1 '{"userId":"1","role":"admin","exp":9999999999}'
          SET session:user2 '{"userId":"2","role":"viewer","exp":9999999999}'
          HSET config:app feature_flags '{"dark_mode":true,"beta":false}'
          HSET config:app rate_limit '100'
          LPUSH queue:emails '{"to":"test@example.com","subject":"Welcome"}'
          SADD online:users "user1" "user2" "user3"
          EOF

          echo "Test data populated"
          redis-cli -h localhost -p 6379 DBSIZE

      - name: Install dependencies
        run: npm ci

      - name: Run Redis integration tests
        run: npm test
        env:
          REDIS_URL: redis://localhost:6379
          REDIS_PREFIX: "test:"

  # ---------------------------------------------------------------------------
  # Job 3: Custom service with port mapping
  # ---------------------------------------------------------------------------
  # You can use ANY Docker image as a service. This example shows a custom
  # API mock server and a mail catcher.
  # ---------------------------------------------------------------------------
  custom-services:
    name: "Custom Service Containers"
    runs-on: ubuntu-latest

    services:
      # MailHog - email testing service
      # Captures all outgoing emails for inspection
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          # SMTP port for sending emails
          - 1025:1025
          # HTTP API port for checking received emails
          - 8025:8025

      # MockServer - HTTP mock service
      # Can be configured to return specific responses
      mockserver:
        image: mockserver/mockserver:5.15.0
        ports:
          - 1080:1080
        env:
          MOCKSERVER_INITIALIZATION_JSON_PATH: /config/initializerJson.json
          MOCKSERVER_LOG_LEVEL: WARN

      # LocalStack - AWS service emulation
      localstack:
        image: localstack/localstack:3.1
        ports:
          - 4566:4566  # All services via single edge port
        env:
          SERVICES: s3,sqs,dynamodb
          DEFAULT_REGION: us-east-1
          DEBUG: "0"
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Verify MailHog
        run: |
          # Check the HTTP API
          curl -sf http://localhost:8025/api/v2/messages | jq .
          echo "MailHog is ready on SMTP:1025 and HTTP:8025"

      - name: Verify LocalStack
        run: |
          # Check LocalStack health
          curl -sf http://localhost:4566/_localstack/health | jq .

          # Create test resources
          # Install AWS CLI (or use pre-installed one)
          aws --endpoint-url=http://localhost:4566 s3 mb s3://test-bucket
          aws --endpoint-url=http://localhost:4566 sqs create-queue \
            --queue-name test-queue
          aws --endpoint-url=http://localhost:4566 dynamodb create-table \
            --table-name test-table \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST

          echo "LocalStack services are ready"
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test
        env:
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          MAILHOG_API: http://localhost:8025
          MOCK_SERVER_URL: http://localhost:1080
          AWS_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: test-bucket
          SQS_QUEUE_URL: http://localhost:4566/000000000000/test-queue
          DYNAMODB_TABLE: test-table

  # ---------------------------------------------------------------------------
  # Job 4: Full stack integration testing pattern
  # ---------------------------------------------------------------------------
  # This demonstrates a realistic integration test setup with multiple
  # services working together.
  # ---------------------------------------------------------------------------
  full-stack-integration:
    name: "Full Stack Integration"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: appsecret
          POSTGRES_DB: myapp_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          # Example: using a migration tool
          echo "Running migrations..."
          PGPASSWORD=appsecret psql \
            -h localhost -p 5432 -U app -d myapp_integration \
            -c "
              CREATE TABLE IF NOT EXISTS users (
                id SERIAL PRIMARY KEY,
                email TEXT UNIQUE NOT NULL,
                created_at TIMESTAMPTZ DEFAULT NOW()
              );
              CREATE TABLE IF NOT EXISTS api_keys (
                id SERIAL PRIMARY KEY,
                user_id INT REFERENCES users(id),
                key TEXT UNIQUE NOT NULL,
                created_at TIMESTAMPTZ DEFAULT NOW()
              );
            "
        env:
          DATABASE_URL: postgresql://app:appsecret@localhost:5432/myapp_integration

      - name: Seed test data
        run: |
          PGPASSWORD=appsecret psql \
            -h localhost -p 5432 -U app -d myapp_integration \
            -c "
              INSERT INTO users (email) VALUES
                ('integration-test@example.com'),
                ('admin@example.com')
              ON CONFLICT (email) DO NOTHING;
            "

          # Seed Redis data
          redis-cli -h localhost -p 6379 SET "config:maintenance_mode" "false"
          redis-cli -h localhost -p 6379 SET "config:rate_limit" "1000"

      - name: Start application server
        run: |
          # Start the app in the background
          npm run start:test &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"

          # Wait for the app to be ready
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start"
              exit 1
            fi
            sleep 1
          done
        env:
          DATABASE_URL: postgresql://app:appsecret@localhost:5432/myapp_integration
          REDIS_URL: redis://localhost:6379
          PORT: "3000"

      - name: Run integration tests
        run: |
          npm run test:integration
        env:
          APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://app:appsecret@localhost:5432/myapp_integration
          REDIS_URL: redis://localhost:6379

      - name: Cleanup
        if: always()
        run: |
          # Stop the application server
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Service with dynamic port assignment
  # ---------------------------------------------------------------------------
  # When you specify only the container port (not host:container), GitHub
  # Actions assigns a random host port. You can retrieve it using the
  # job.services.<id>.ports context.
  # ---------------------------------------------------------------------------
  dynamic-ports:
    name: "Dynamic Port Assignment"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        # Only container port - host port will be randomly assigned
        ports:
          - 6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Access the dynamically assigned port
      - name: Show dynamic port
        run: |
          # The dynamically assigned host port for container port 6379
          REDIS_PORT="${{ job.services.redis.ports['6379'] }}"
          echo "Redis is accessible at localhost:${REDIS_PORT}"

          # Verify connectivity on the dynamic port
          redis-cli -h localhost -p "${REDIS_PORT}" ping

      - name: Use dynamic port in tests
        run: |
          echo "Would run tests with REDIS_URL=redis://localhost:${{ job.services.redis.ports['6379'] }}"
        env:
          REDIS_URL: redis://localhost:${{ job.services.redis.ports['6379'] }}
