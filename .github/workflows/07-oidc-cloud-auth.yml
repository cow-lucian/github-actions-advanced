  # ===========================================================================
  # Demonstration job (actually runs) - shows OIDC token claims
  # ===========================================================================
  show-oidc-claims:
    name: "Show OIDC Token Claims"
    runs-on: ubuntu-latest

    steps:
      - name: Get OIDC token and show claims
        run: |
          # Request an OIDC token from GitHub
          # This requires id-token: write permission
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://example.com" \
            | jq -r '.value')

          if [ "$OIDC_TOKEN" = "null" ] || [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not retrieve OIDC token. This is expected in some contexts (e.g., forks, PRs from forks)."
            exit 0
          fi

          # Decode the JWT payload (middle section) - DO NOT log the full token!
          echo "=== OIDC Token Claims ==="
          echo "$OIDC_TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '{
            iss: .iss,
            sub: .sub,
            aud: .aud,
            ref: .ref,
            sha: .sha,
            repository: .repository,
            repository_owner: .repository_owner,
            actor: .actor,
            workflow: .workflow,
            event_name: .event_name,
            ref_type: .ref_type,
            job_workflow_ref: .job_workflow_ref,
            runner_environment: .runner_environment,
            iat: (.iat | todate),
            exp: (.exp | todate)
          }' || echo "Could not decode token claims"

          echo ""
          echo "=== Key Points ==="
          echo "- 'sub' claim is used by cloud providers to validate trust"
          echo "- 'repository' claim identifies which repo the token is for"
          echo "- 'ref' claim identifies the branch/tag"
          echo "- Token is short-lived (check iat/exp)"
        env:
          # These environment variables are automatically set when
          # id-token: write permission is granted
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

