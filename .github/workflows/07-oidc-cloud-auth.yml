# =============================================================================
# 07 - OIDC Cloud Authentication
# =============================================================================
# OpenID Connect (OIDC) allows GitHub Actions workflows to authenticate with
# cloud providers WITHOUT storing long-lived credentials as secrets.
#
# How it works:
#   1. GitHub Actions generates a short-lived JWT (OIDC token) for each
#      workflow run. This token includes claims about the repo, branch,
#      workflow, and job.
#   2. Your cloud provider is configured to trust GitHub's OIDC provider
#      (token.actions.githubusercontent.com).
#   3. The workflow exchanges the GitHub OIDC token for short-lived cloud
#      credentials using the cloud provider's STS (Security Token Service).
#
# Benefits:
#   - No long-lived secrets to rotate
#   - Credentials are scoped to a single workflow run
#   - Fine-grained trust policies (restrict by repo, branch, environment)
#   - Audit trail of which workflow run used which credentials
#
# TRUST RELATIONSHIP SETUP:
#   You MUST configure the cloud provider to trust GitHub's OIDC tokens
#   before these workflows will work. See comments in each section below.
#
# REQUIRED PERMISSION:
#   The workflow MUST request `id-token: write` permission to get OIDC tokens.
# =============================================================================

name: "07 - OIDC Cloud Authentication"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# =============================================================================
# CRITICAL: id-token: write is REQUIRED for OIDC
# Without this, the workflow cannot request OIDC tokens from GitHub
# =============================================================================
permissions:
  id-token: write    # Required for OIDC token generation
  contents: read     # Required to checkout code

