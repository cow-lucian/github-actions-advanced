  # TRUST SETUP FOR AWS:
  #   1. Go to AWS IAM Console → Identity Providers → Add Provider
  #   2. Provider Type: OpenID Connect
  #   3. Provider URL: https://token.actions.githubusercontent.com
  #   4. Audience: sts.amazonaws.com
  #   5. Create an IAM Role with the following trust policy:
  #      {
  #        "Version": "2012-10-17",
  #        "Statement": [
  #          {
  #            "Effect": "Allow",
  #            "Principal": {
  #              "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com"
  #            },
  #            "Action": "sts:AssumeRoleWithWebIdentity",
  #            "Condition": {
  #              "StringEquals": {
  #                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
  #              },
  #              "StringLike": {
  #                "token.actions.githubusercontent.com:sub": "repo:cow-lucian/github-actions-advanced:*"
  #              }
  #            }
  #          }
  #        ]
  #      }
  #
  #   You can restrict further:
  #     - Specific branch: "repo:cow-lucian/github-actions-advanced:ref:refs/heads/main"
  #     - Specific environment: "repo:cow-lucian/github-actions-advanced:environment:production"
  #     - Pull requests: "repo:cow-lucian/github-actions-advanced:pull_request"
  #
  #   6. Attach IAM policies to the role for the permissions you need
  #      (e.g., S3 read/write, ECR push, ECS deploy, etc.)
  # ===========================================================================

