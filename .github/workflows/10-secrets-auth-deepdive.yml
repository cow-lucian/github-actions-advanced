# =============================================================================
# 10 - Secrets & Authentication Deep Dive
# =============================================================================
# SCHOLAR NOTE:
#   This workflow provides an advanced exploration of authentication patterns
#   in GitHub Actions, covering:
#
#   1. GITHUB_TOKEN internals and permission escalation
#   2. GitHub App token generation (JWT flow)
#   3. OIDC tokens for cloud providers (AWS, Azure, GCP)
#   4. Secret rotation patterns
#   5. Keyless authentication (OIDC)
#   6. Token security and auditing
#
# THE AUTHENTICATION HIERARCHY:
#   +---------------------------------------------------+
#   | Level 1: GITHUB_TOKEN (automatic, per-job)        |
#   |   - Scoped to current repo                        |
#   |   - Cannot trigger other workflows                |
#   |   - Cannot access other repos                     |
#   +---------------------------------------------------+
#   | Level 2: GitHub App Token (JWT-based)              |
#   |   - Scoped to installed repos                     |
#   |   - CAN trigger other workflows                   |
#   |   - CAN access other repos (where installed)      |
#   |   - Expires in 1 hour                             |
#   +---------------------------------------------------+
#   | Level 3: PAT - Fine-grained (user-scoped)         |
#   |   - Scoped to selected repos                      |
#   |   - CAN trigger workflows                         |
#   |   - Tied to a user account                        |
#   +---------------------------------------------------+
#   | Level 4: PAT - Classic (broad access)             |
#   |   - Scope-based (repo, admin:org, etc.)           |
#   |   - Broadest access, least secure                 |
#   |   - Avoid in production                           |
#   +---------------------------------------------------+
#   | Level 5: OIDC Token (keyless, no stored secrets)  |
#   |   - Federated identity, no secret to store        |
#   |   - Cloud provider trusts GitHub as IdP           |
#   |   - Most secure for cloud access                  |
#   +---------------------------------------------------+
# =============================================================================

name: "10 - Secrets & Authentication Deep Dive"

on:
  workflow_dispatch:
    inputs:
      demo:
        description: "Which demo to run"
        type: choice
        options:
          - github-token-internals
          - app-token-flow
          - oidc-explained
          - token-audit
          - all
        default: all
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # Required for OIDC token generation

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: GITHUB_TOKEN Internals
  # ---------------------------------------------------------------------------
  github-token-internals:
    name: "GITHUB_TOKEN Internals"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.demo == 'github-token-internals' || inputs.demo == 'all'))

    # Per-job permissions override workflow-level
    permissions:
      contents: read
      issues: write
      pull-requests: read
      statuses: write
      actions: read

    steps:
      - name: "Inspect GITHUB_TOKEN"
        uses: actions/github-script@v7
        with:
          script: |
            // The GITHUB_TOKEN is a GitHub App installation token created
            // specifically for this workflow run.

            // Check what permissions we have
            console.log('=== GITHUB_TOKEN Inspection ===\n');

            // Test each permission by making API calls
            const checks = [
              {
                name: 'contents:read',
                test: () => github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                }),
              },
              {
                name: 'issues:write',
                test: () => github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 1,
                }),
              },
              {
                name: 'actions:read',
                test: () => github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 1,
                }),
              },
            ];

            for (const check of checks) {
              try {
                await check.test();
                console.log(`  ${check.name}: ALLOWED`);
              } catch (e) {
                console.log(`  ${check.name}: DENIED (${e.status})`);
              }
            }

            // Token metadata
            console.log('\n=== Token Metadata ===');
            console.log(`Repository: ${context.repo.owner}/${context.repo.repo}`);
            console.log(`Run ID: ${context.runId}`);
            console.log(`Run number: ${context.runNumber}`);
            console.log(`Actor: ${context.actor}`);

      - name: "GITHUB_TOKEN limitations"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## GITHUB_TOKEN Limitations & Workarounds

          | Limitation | Workaround |
          |-----------|------------|
          | Cannot trigger other workflows | Use GitHub App token or PAT |
          | Cannot access other repos | Use GitHub App (installed on target) |
          | Cannot push to protected branches | Add App as bypass actor |
          | Cannot manage repo settings | Use PAT with admin scope |
          | Cannot create webhooks | Use PAT with admin:repo_hook |
          | Max 1000 API requests/hr | Use GitHub App (5000/hr/install) |

          ### Permission Escalation Pattern
          ```yaml
          # Step 1: Generate a higher-privilege token
          - uses: actions/create-github-app-token@v1
            id: app-token
            with:
              app-id: ${{ secrets.APP_ID }}
              private-key: ${{ secrets.APP_PRIVATE_KEY }}

          # Step 2: Use it for privileged operations
          - uses: actions/checkout@v4
            with:
              token: ${{ steps.app-token.outputs.token }}
              # Now pushes will trigger other workflows
          ```
          EOF

  # ---------------------------------------------------------------------------
  # Job 2: GitHub App Token Generation Flow
  # ---------------------------------------------------------------------------
  app-token-flow:
    name: "GitHub App Token Flow"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.demo == 'app-token-flow' || inputs.demo == 'all')
    steps:
      - name: "Document the complete App token flow"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## GitHub App Token Generation Flow

          ```
          +---------------------+
          |  App Private Key    |  (stored as secret: APP_PRIVATE_KEY)
          |  App ID             |  (stored as secret: APP_ID)
          +---------------------+
                  |
                  v
          +---------------------+
          |  Step 1: Create JWT |
          |  Header: RS256      |
          |  Payload:           |
          |    iss: APP_ID      |
          |    iat: now - 60s   |
          |    exp: now + 600s  |
          |  Sign with PEM key  |
          +---------------------+
                  |
                  v  (JWT valid for 10 minutes)
          +---------------------+
          |  Step 2: Find       |
          |  Installation ID    |
          |                     |
          |  GET /repos/:owner/ |
          |   :repo/installation|
          |  Auth: Bearer <JWT> |
          +---------------------+
                  |
                  v
          +-----------------------------+
          |  Step 3: Create Token       |
          |                             |
          |  POST /app/installations/   |
          |   :id/access_tokens         |
          |  Auth: Bearer <JWT>         |
          |  Body:                      |
          |    repositories: [optional] |
          |    permissions: {optional}  |
          +-----------------------------+
                  |
                  v  (Token valid for 1 hour)
          +-----------------------------+
          |  Step 4: Use Token          |
          |                             |
          |  Authorization: token <T>   |
          |  - Push code                |
          |  - Create PRs               |
          |  - Trigger workflows        |
          |  - Cross-repo operations    |
          +-----------------------------+
          ```

          ### Using actions/create-github-app-token (Recommended)
          ```yaml
          - name: Generate token
            id: app-token
            uses: actions/create-github-app-token@v1
            with:
              app-id: ${{ secrets.APP_ID }}
              private-key: ${{ secrets.APP_PRIVATE_KEY }}
              # Optional: scope to specific repos
              repositories: 'repo-a,repo-b'
              # Optional: scope to an org
              owner: 'my-org'

          - name: Use the token
            run: gh api repos/org/repo/dispatches -f event_type=deploy
            env:
              GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ```

          ### Creating a GitHub App: Step by Step
          1. Go to **Settings** > **Developer settings** > **GitHub Apps**
          2. Click **New GitHub App**
          3. Fill in:
             - **Name**: `my-org-ci-bot` (must be unique on GitHub)
             - **Homepage URL**: Your org URL
             - **Webhook**: Uncheck "Active" (not needed for token generation)
          4. Set **Permissions**:
             - Repository: Contents (Read & write), Pull requests (Read & write)
             - Repository: Actions (Read & write), Issues (Read & write)
          5. Click **Create GitHub App**
          6. Note the **App ID** from the settings page
          7. Scroll down and click **Generate a private key**
          8. Save the downloaded `.pem` file
          9. Go to **Install App** > Install on your org/repos
          10. Store secrets:
              ```bash
              gh secret set APP_ID --body "12345"
              gh secret set APP_PRIVATE_KEY < my-app.private-key.pem
              ```
          EOF

  # ---------------------------------------------------------------------------
  # Job 3: OIDC Token Explained
  # ---------------------------------------------------------------------------
  oidc-explained:
    name: "OIDC Token (Keyless Auth)"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.demo == 'oidc-explained' || inputs.demo == 'all')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Request OIDC token (demonstration)"
        uses: actions/github-script@v7
        with:
          script: |
            // OIDC (OpenID Connect) allows GitHub Actions to authenticate
            // with cloud providers WITHOUT storing any secrets.
            //
            // How it works:
            // 1. GitHub Actions generates a JWT (OIDC token)
            // 2. The JWT contains claims about the workflow run
            // 3. Cloud provider validates the JWT against GitHub's OIDC provider
            // 4. If the claims match the trust policy, access is granted
            //
            // Claims in the OIDC token:
            //   sub: repo:org/repo:ref:refs/heads/main
            //   aud: https://github.com/org
            //   iss: https://token.actions.githubusercontent.com
            //   repository: org/repo
            //   repository_owner: org
            //   workflow: workflow-name
            //   ref: refs/heads/main
            //   sha: commit-sha
            //   actor: github-username
            //   environment: production (if set)

            try {
              const token = await core.getIDToken('sts.amazonaws.com');
              console.log('OIDC token generated successfully');
              console.log(`Token length: ${token.length} characters`);

              // Decode the JWT payload (middle part) to see claims
              const parts = token.split('.');
              const payload = JSON.parse(Buffer.from(parts[1], 'base64').toString());
              console.log('\n=== OIDC Token Claims ===');
              console.log(`  sub: ${payload.sub}`);
              console.log(`  aud: ${payload.aud}`);
              console.log(`  iss: ${payload.iss}`);
              console.log(`  repository: ${payload.repository}`);
              console.log(`  ref: ${payload.ref}`);
              console.log(`  sha: ${payload.sha}`);
              console.log(`  actor: ${payload.actor}`);
              console.log(`  workflow: ${payload.workflow}`);
              console.log(`  environment: ${payload.environment || 'not set'}`);
            } catch (e) {
              console.log(`OIDC token request: ${e.message}`);
              console.log('This is expected if id-token permission is not set');
            }

      - name: "OIDC setup documentation"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## OIDC (Keyless) Authentication

          ### Why OIDC is More Secure Than Secrets
          | Aspect | Stored Secrets | OIDC |
          |--------|---------------|------|
          | Secret rotation | Manual | Not needed (no secret!) |
          | Secret exposure risk | Medium | None |
          | Scope | Broad (whoever has the secret) | Fine-grained (per-workflow) |
          | Auditing | Limited | Full claim-based audit |
          | Setup complexity | Low | Medium (one-time) |

          ### AWS OIDC Setup
          ```yaml
          permissions:
            id-token: write
            contents: read

          steps:
            - uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::123456789:role/github-actions
                aws-region: us-east-1
                # No access keys needed!
          ```

          AWS trust policy:
          ```json
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::123456789:oidc-provider/token.actions.githubusercontent.com"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                },
                "StringLike": {
                  "token.actions.githubusercontent.com:sub": "repo:org/repo:ref:refs/heads/main"
                }
              }
            }]
          }
          ```

          ### Azure OIDC Setup
          ```yaml
          steps:
            - uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                # Uses OIDC - no client secret needed!
          ```

          ### GCP OIDC Setup
          ```yaml
          steps:
            - uses: google-github-actions/auth@v2
              with:
                workload_identity_provider: projects/123/locations/global/workloadIdentityPools/github/providers/github
                service_account: ci@project.iam.gserviceaccount.com
                # Uses OIDC - no service account key needed!
          ```
          EOF

  # ---------------------------------------------------------------------------
  # Job 4: Token Audit & Security
  # ---------------------------------------------------------------------------
  token-audit:
    name: "Token Audit"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.demo == 'token-audit' || inputs.demo == 'all')
    steps:
      - name: "Token security audit checklist"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Token Security Audit Checklist

          ### Secrets Inventory
          ```bash
          # List all repository secrets
          gh secret list

          # List all organization secrets
          gh secret list --org my-org

          # List all environment secrets
          gh secret list --env production
          ```

          ### Audit Questions
          - [ ] Are there any classic PATs that should be fine-grained?
          - [ ] Are all secrets rotated within the last 90 days?
          - [ ] Are production secrets in a protected environment?
          - [ ] Do protected environments require reviewer approval?
          - [ ] Is branch protection limiting who can deploy?
          - [ ] Are OIDC tokens used instead of stored cloud credentials?
          - [ ] Are GitHub App tokens used instead of PATs?
          - [ ] Are workflow permissions set to minimum required?
          - [ ] Is the default GITHUB_TOKEN permission set to read-only?

          ### Secret Rotation Script
          ```bash
          #!/bin/bash
          # Rotate a secret and verify the new value works

          # 1. Generate new value
          NEW_SECRET=$(openssl rand -hex 32)

          # 2. Update in GitHub
          gh secret set MY_SECRET --body "$NEW_SECRET"

          # 3. Trigger a test workflow to verify
          gh workflow run test.yml

          # 4. Check the run status
          gh run list --workflow=test.yml --limit 1
          ```

          ### Monitoring Recommendations
          1. Enable GitHub audit log for secret access
          2. Set up alerts for failed deployments (may indicate bad secrets)
          3. Review Actions logs for unexpected token usage patterns
          4. Use GitHub's secret scanning to detect leaked tokens
          5. Enable required reviewers for environments with sensitive secrets
          EOF
